apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: employee-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: {{ .Values.ingress.path | quote }}
        pathType: {{ .Values.ingress.pathType | quote }}
        backend:
          service:
            name: employee-api
            port:
              number: {{ .Values.ingress.servicePort }}