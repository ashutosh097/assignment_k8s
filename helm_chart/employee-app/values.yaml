image:
  repository: ashutoshkumar0097/employees-api
  tag: "1.0"
  pullPolicy: Always

api:
  replicas: 4
  containerPort: 3000
  service:
    port: 80
    targetPort: 3000
    type: "ClusterIP"
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

mysql:
  replicas: 1
  image: mysql:8
  database: employees_db
  containerPort: 3306
  service:
    clusterIP: "None"
    port: 3306
    targetPort: 3306
  storage: 10Gi

config:
  dbHost: mysql
  dbPort: "3306"

secret:
  username: employee_user
  password: Password1234

hpa:
  minReplicas: 4
  maxReplicas: 10
  cpuUtilization: 70

ingress:
  enabled: true
  host: k8sdemo.ashutosh.com
  ingressClass: nginx
  path: /
  pathType: Prefix
  servicePort: 80